<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Boeing 777 Flight Deck</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #1c2024; 
            color: #e2e8f0; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #ffffff; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; margin-bottom: 25px; }

        .cockpit-container { 
            position: relative; 
            display: inline-block; 
            max-width: 100%;
            border: 4px solid #475569; border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.6);
        }
        img { max-width: 100%; height: auto; display: block; }

        .panel-box {
            position: absolute;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            text-decoration: none;
        }
        .panel-box:hover {
            background: rgba(245, 158, 11, 0.22); 
            border-color: #f59e0b;
        }

        .panel-box::after {
            content: attr(title);
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            color: #f59e0b;
            font-size: 0.75em; font-weight: 600;
            padding: 4px 8px; border-radius: 4px;
            white-space: nowrap; opacity: 0;
            transition: opacity 0.15s; pointer-events: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
        }
        .panel-box:hover::after { opacity: 1; }

        /* ── MAPPED COORDINATES FOR YOUR TARGET FILES ── */
        #overhead          { top: 0%;    left: 23%;  width: 54%;  height: 35%; }
        #compass           { top: 35%;   left: 48.5%;width: 3%;   height: 6%;  }
        #glareshield       { top: 48%;   left: 36%;  width: 29%;  height: 6%;  }
        #main-panel        { top: 54%;   left: 31%;  width: 38%;  height: 13%; }
        #pedestal          { top: 67%;   left: 41%;  width: 18%;  height: 33%; }
        #yokes             { top: 62%;   left: 24%;  width: 52%;  height: 25%; pointer-events: none; } /* Visual wrapper */
        #yoke-left         { top: 62%;   left: 24%;  width: 12%;  height: 25%; }
        #yoke-right        { top: 62%;   left: 64%;  width: 12%;  height: 25%; }
        #lateral-capt      { top: 55%;   left: 0%;   width: 23%;  height: 35%; }
        #lateral-fo        { top: 55%;   left: 77%;  width: 23%;  height: 35%; }
        #seat-capt         { top: 76%;   left: 5%;   width: 22%;  height: 24%; }
        #seat-fo           { top: 76%;   left: 72%;  width: 22%;  height: 24%; }
    </style>
</head>
<body>

    <h1>Boeing 777 Flight Deck Guide</h1>
    <p class="subtitle">Hover over a layout section to highlight its components. Click to inspect technical parameters.</p>

    <div class="cockpit-container">
        <img src="b777_cockpit.jpg" alt="Boeing 777 Flight Deck System Breakdown">

        <a href="b777_overhead.html"     class="panel-box" id="overhead"      title="Overhead Panel System"></a>
        <a href="b777_compass.html"      class="panel-box" id="compass"       title="Standby Compass & Eye Ref"></a>
        <a href="b777_glareshield.html"  class="panel-box" id="glareshield"   title="Glareshield & MCP"></a>
        <a href="b777_mainpanel.html"    class="panel-box" id="main-panel"    title="Main Panel Display System (MFDs/EICAS)"></a>
        <a href="b777_pedestal.html"     class="panel-box" id="pedestal"      title="Control Stand & Pedestal (Throttles/CDUs)"></a>
        <a href="b777_yokes.html"        class="panel-box" id="yoke-left"     title="Captain Control Column (Yoke)"></a>
        <a href="b777_yokes.html"        class="panel-box" id="yoke-right"    title="First Officer Control Column (Yoke)"></a>
        <a href="b777_lateral_capt.html" class="panel-box" id="lateral-capt"  title="Captain Lateral Side Console"></a>
        <a href="b777_lateral_fo.html"   class="panel-box" id="lateral-fo"    title="First Officer Lateral Side Console"></a>
        <a href="b777_seats.html"        class="panel-box" id="seat-capt"     title="Pilot Seats"></a>
        <a href="b777_seats.html"        class="panel-box" id="seat-fo"       title="Pilot Seats"></a>
    </div>

</body>
</html>
