<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Boeing 777 Flight Deck</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            /* Switched from Airbus Blue-Grey to classic Boeing Dark Brown */
            background: #1e1a17; 
            color: #e2e8f0; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #ffffff; margin-bottom: 5px; }
        .subtitle { color: #a1a1aa; margin-bottom: 25px; text-align: center; }

        .cockpit-container { 
            position: relative; 
            display: inline-block; 
            max-width: 100%;
            border: 4px solid #3f3732; border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.8);
        }
        img { max-width: 100%; height: auto; display: block; }

        .panel-box {
            position: absolute;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            text-decoration: none;
        }
        .panel-box:hover {
            /* Warm amber tint for the Boeing cockpit aesthetic */
            background: rgba(245, 158, 11, 0.2); 
            border-color: #f59e0b;
        }

        .panel-box::after {
            content: attr(title);
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 26, 23, 0.95);
            color: #f59e0b;
            font-size: 0.75em; font-weight: 600;
            padding: 6px 10px; border-radius: 4px;
            white-space: nowrap; opacity: 0;
            transition: opacity 0.15s; pointer-events: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
            border: 1px solid #574c45;
        }
        .panel-box:hover::after { opacity: 1; }

        /* ── RE-MAPPED COORDINATES TUNED TO YOUR UPLOADED IMAGE ── */
        #overhead         { top: 0%;    left: 0%;    width: 100%; height: 32%; }
        #compass          { top: 32%;   left: 46%;   width: 8%;   height: 4%;  }
        #glareshield      { top: 42%;   left: 27%;   width: 46%;  height: 5%;  }
        #main-panel       { top: 48%;   left: 20%;   width: 60%;  height: 10%; }
        #pedestal         { top: 58%;   left: 29%;   width: 42%;  height: 42%; }
        #yoke-left        { top: 53%;   left: 8%;    width: 21%;  height: 15%; }
        #yoke-right       { top: 53%;   left: 71%;   width: 21%;  height: 15%; }
        #lateral-capt     { top: 48%;   left: 0%;    width: 20%;  height: 25%; }
        #lateral-fo       { top: 48%;   left: 80%;   width: 20%;  height: 25%; }
        #seat-capt        { top: 74%;   left: 0%;    width: 24%;  height: 26%; }
        #seat-fo          { top: 74%;   left: 76%;   width: 24%;  height: 26%; }
    </style>
</head>
<body>

    <h1>Boeing 777 Flight Deck Guide</h1>
    <p class="subtitle">Hover over a layout section to highlight its components. Click to inspect technical parameters.</p>

    <div class="cockpit-container">
        <img src="b777_cockpit.jpeg" alt="Boeing 777 Flight Deck System Breakdown">

        <a href="b777_overhead.html"     class="panel-box" id="overhead"      title="Overhead Panel System"></a>
        <a href="b777_compass.html"      class="panel-box" id="compass"       title="Standby Compass & Eye Ref"></a>
        <a href="b777_glareshield.html"  class="panel-box" id="glareshield"   title="Glareshield & MCP"></a>
        <a href="b777_mainpanel.html"    class="panel-box" id="main-panel"    title="Main Panel Display System (MFDs/EICAS)"></a>
        <a href="b777_pedestal.html"     class="panel-box" id="pedestal"      title="Control Stand & Pedestal (Throttles/CDUs)"></a>
        <a href="b777_yokes.html"        class="panel-box" id="yoke-left"     title="Captain Control Column (Yoke)"></a>
        <a href="b777_yokes.html"        class="panel-box" id="yoke-right"    title="First Officer Control Column (Yoke)"></a>
        <a href="b777_lateral_capt.html" class="panel-box" id="lateral-capt"  title="Captain Lateral Side Console"></a>
        <a href="b777_lateral_fo.html"   class="panel-box" id="lateral-fo"    title="First Officer Lateral Side Console"></a>
        <a href="b777_seats.html"        class="panel-box" id="seat-capt"     title="Captain Pilot Seat"></a>
        <a href="b777_seats.html"        class="panel-box" id="seat-fo"       title="First Officer Pilot Seat"></a>
    </div>

</body>
</html>
