<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Boeing 777 Flight Deck</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #1a1412; 
            color: #e2e8f0; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #ffffff; margin-bottom: 5px; }
        .subtitle { color: #bcaaa4; margin-bottom: 25px; text-align: center; }

        .cockpit-container { 
            position: relative; 
            display: inline-block; 
            max-width: 600px; 
            width: 100%;
            margin: 0 auto;
            border: 4px solid #3e2723; border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.9);
        }
        img { max-width: 100%; height: auto; display: block; }

        .panel-box {
            position: absolute;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            text-decoration: none;
        }
        .panel-box:hover {
            background: rgba(245, 158, 11, 0.2); 
            border-color: #f59e0b;
        }

        /* Hover Tooltip */
        .panel-box::after {
            content: attr(title);
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 20, 18, 0.95);
            color: #f59e0b;
            font-size: 0.75em; font-weight: 600;
            padding: 6px 10px; border-radius: 4px;
            white-space: nowrap; opacity: 0;
            transition: opacity 0.15s; pointer-events: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
            border: 1px solid #4e342e;
        }
        .panel-box:hover::after { opacity: 1; }

        /* ── POP-UP MODAL OVERLAY ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease-in-out;
            z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: #2b1f1c;
            border: 2px solid #5d4037;
            border-radius: 8px;
            padding: 24px;
            max-width: 450px; width: 90%;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.7);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s ease-in-out;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }

        .modal-box h3 { margin-top: 0; color: #ffffff; font-size: 1.3rem; }
        .modal-box p { color: #d7ccc8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; }

        /* Action Buttons */
        .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 16px; border-radius: 4px; border: none;
            font-weight: 600; cursor: pointer; text-decoration: none; font-size: 0.9rem;
            transition: background 0.15s;
        }
        .btn-secondary { background: #4e342e; color: #e2e8f0; }
        .btn-secondary:hover { background: #5d4037; }

        /* Mapped Coordinates */
        #overhead         { top: 0%;    left: 0%;    width: 100%; height: 32%; }
        #compass          { top: 32%;   left: 46%;   width: 8%;   height: 4%;  }
        #glareshield      { top: 42%;   left: 15%;   width: 70%;  height: 23.5%;  }
        #pedestal         { top: 58%;   left: 29%;   width: 42%;  height: 42%; }
        #yoke-left        { top: 53%;   left: 8%;    width: 21%;  height: 15%; }
        #yoke-right       { top: 53%;   left: 71%;   width: 21%;  height: 15%; }
        #lateral-capt     { top: 48%;   left: 0%;    width: 20%;  height: 25%; }
        #lateral-fo       { top: 48%;   left: 80%;   width: 20%;  height: 25%; }
        #seat-capt        { top: 74%;   left: 0%;    width: 24%;  height: 26%; }
        #seat-fo          { top: 74%;   left: 76%;   width: 24%;  height: 26%; }
    </style>
</head>
<body>

    <h1>Boeing 777 Flight Deck Guide</h1>
    <p class="subtitle">Hover over a layout section to preview. Click panels to visit pages, or click yokes for details.</p>

    <div class="cockpit-container">
        <img src="b777_cockpit.jpeg" alt="Boeing 777 Flight Deck System Breakdown">

        <a href="overhead.html"     class="panel-box" id="overhead"      title="Overhead Panel System" data-summary="Manages primary electrical, hydraulic, fuel, and air conditioning aircraft sub-systems."></a>
        <a href="compass.html"      class="panel-box" id="compass"       title="Standby Compass & Eye Ref" data-summary="Provides mechanical, magnetic direction backup independent of main systems."></a>
        <a href="glareshield.html"  class="panel-box" id="glareshield"   title="Glareshield & Main Panel" data-summary="Houses Autoflight system control panel (Mode Control Panel), EFIS display settings and Primary Flight Displays and Engine Indication/Crew Alerting System screens."></a>
        <a href="pedestal.html"     class="panel-box" id="pedestal"      title="Control Stand & Pedestal (Throttles/CDUs)" data-summary="Contains thrust levers, flap selectors, radio panels, and Control Display Units."></a>

        <a href="CaptLateral.html" class="panel-box" id="lateral-capt"  title="Lateral Console — Capt" data-summary="Houses side window controls, oxygen mask stowage, and audio select panels."></a>
        <a href="FOLateral.html"   class="panel-box" id="lateral-fo"    title="Lateral Console - FO" data-summary="First Officer side instrumentation, window operation, and oxygen interface."></a>
        <a href="capt_seat.html"        class="panel-box" id="seat-capt"     title="Capt Seat" data-summary="Fully adjustable primary crew seat with restraint tracking assemblies."></a>
        <a href="fo_seat.html"        class="panel-box" id="seat-fo"       title="FO Seat" data-summary="Fully adjustable primary co-pilot crew accommodation seat."></a>
        
        <div class="panel-box yoke-trigger" id="yoke-left"     title="Capt Control Column (Yoke)" data-summary="Captain's primary pitch and roll mechanical control interface."></div>
        <div class="panel-box yoke-trigger" id="yoke-right"    title="FO Control Column (Yoke)" data-summary="First Officer's primary pitch and roll mechanical control interface."></div>
    </div>

    <div class="modal-overlay" id="infoModal">
        <div class="modal-box">
            <h3 id="modalTitle">Panel Name</h3>
            <p id="modalDescription">Quick description overview goes here.</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">✕ Close</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('infoModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDescription = document.getElementById('modalDescription');
        const yokeTriggers = document.querySelectorAll('.yoke-trigger');

        // Setup click listeners exclusively for the yoke boxes
        yokeTriggers.forEach(yoke => {
            yoke.addEventListener('click', function() {
                const title = this.getAttribute('title');
                const summary = this.getAttribute('data-summary') || "No layout description provided.";

                // Feed descriptive values into popup overlay elements
                modalTitle.textContent = title;
                modalDescription.textContent = summary;

                // Open the modal frame
                modal.classList.add('active');
            });
        });

        function closeModal() {
            modal.classList.remove('active');
        }

        // Close layout layer if outer dim environment gets clicked
        modal.addEventListener('click', function(e) {
            if(e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
