<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glareshield Switches Overview</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           
            background: #1a1412; color: #e2e8f0;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            align-self: flex-start; color: #f59e0b;
            text-decoration: none; font-weight: bold; margin-bottom: 20px;
        }
        .back-link:hover { text-decoration: underline; }
        
        h1 { color: #ffffff; margin-bottom: 5px; text-align: center; }
        .subtitle { color: #bcaaa4; margin-bottom: 30px; text-align: center; }

        .image-container {
            position: relative;
            display: inline-block;
            max-width: 50%;
            border: 4px solid #3e2723;
            border-radius: 8px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.9);
            overflow: hidden;
            margin-bottom: 35px;
        }
        .image-container img { max-width: 100%; height: auto; display: block; max-height: 65vh; }

        /* Dotted highlight switch overlay ring mapping rules */
        .switch-zone {
            position: absolute;
            background: rgba(141, 110, 99, 0.12);
            border: 1.5px dashed rgba(215, 204, 200, 0.6);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .switch-zone:hover {
            background: rgba(245, 158, 11, 0.25);
            border-color: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
        }

        /* Temporary initial mock placements for switches (Ready for you to change/add more) */
        #sw-mcp-disengage { top: 45%; left: 50%; width: 4.5%; height: 9%; }
        #sw-gear-lever     { top: 35%; left: 59%; width: 3.5%; height: 12%; }

        /* Popup Box Layout Overlays */
        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 99;
        }
        
        .popup-box {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #2b1f1c;
            border: 2px solid #f59e0b;
            padding: 22px 25px;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9);
            z-index: 100;
            width: 92%; max-width: 600px;
        }
        
        .popup-box h3 { margin: 0 0 12px 0; color: #ffffff; font-size: 1.2em; }
        .popup-divider { border: none; border-top: 1px solid #4e342e; margin: 12px 0; }
        
        .close-btn {
            position: absolute; top: 12px; right: 12px;
            background: #4e342e; color: white; border: none;
            padding: 4px 9px; cursor: pointer; border-radius: 4px; font-size: 0.85em;
        }
        .close-btn:hover { background: #d97706; color: #1a1412; }

        .guide-image {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #4e342e;
            margin-top: 10px;
        }
        
        .btn-trigger {
            background: #4e342e; color: white;
            border: 1px solid #f59e0b; padding: 10px 18px;
            font-weight: bold; border-radius: 6px;
            cursor: pointer; margin-bottom: 25px;
            transition: all 0.2s;
        }
        .btn-trigger:hover { background: #d97706; color: #1a1412; }
    </style>
</head>
<body>

    <a href="glareshield.html" class="back-link">← Back to Instruments Configuration</a>
    
    <h1>Glareshield & Main Panel Switches</h1>
    <p class="subtitle">Highlighting physical cockpit switches.</p>

    <!-- The Box Trigger Action Button -->
    <button class="btn-trigger" onclick="showPopup('switches-guide')">Open Switches Guide</button>

    <!-- KEEP ONLY ONE IMAGE VISIBLE ON SCREEN -->
    <div class="image-container">
        <img src="main.jpeg" alt="Panel Workspace View">
        
        <!-- Interactive target rings overlay markers container -->
        <div class="switch-zone" id="sw-mcp-disengage" onclick="alert('MCP Disengage Bar Selected')" title="MCP Disengage Switch"></div>
        <div class="switch-zone" id="sw-gear-lever" onclick="alert('Landing Gear Toggle Switch Selected')" title="Gear Selector Switch"></div>
    </div>

    <!-- Background Shadows Layout Screen -->
    <div id="dark-screen" class="overlay-screen" onclick="closeAllPopups()"></div>

    <!-- THE DYNAMIC MODAL BOX FOR PBGUIDE.JPG -->
    <div id="popup-switches-guide" class="popup-box">
        <button class="close-btn" onclick="closeAllPopups()">✕</button>
        <h3>Switches Guide</h3>
        <div class="popup-divider"></div>
        <!-- PBGuide picture safely embedded only within this pop-up component -->
        <img src="PBGuide.jpg" alt="Push Button Configuration Overview Diagram" class="guide-image">
    </div>

    <script>
        function showPopup(id) {
            closeAllPopups();
            document.getElementById('dark-screen').style.display = 'block';
            document.getElementById('popup-' + id).style.display = 'block';
        }
        function closeAllPopups() {
            document.getElementById('dark-screen').style.display = 'none';
            const boxes = document.querySelectorAll('.popup-box');
            boxes.forEach(box => box.style.display = 'none');
        }

        // Auto-opens the Switches Guide modal instantly upon loading the page
        window.addEventListener('DOMContentLoaded', () => {
            showPopup('switches-guide');
        });
    </script>
</body>
</html>
