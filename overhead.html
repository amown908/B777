<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overhead Panel</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1412; color: #e2e8f0;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            align-self: flex-start; color: #f59e0b;
            text-decoration: none; font-weight: bold; margin-bottom: 20px;
        }
        .back-link:hover { text-decoration: underline; }
        h1 { color: #ffffff; margin-bottom: 5px; }
        .subtitle { color: #bcaaa4; margin-bottom: 25px; }

        .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            border: 4px solid #3e2723;
            border-radius: 8px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.9);
            overflow: hidden;
            margin-bottom: 35px;
        }
        img { max-width: 100%; height: auto; display: block; }

        /* Boeing styling for clickable panel zones */
        .panel-zone {
            position: absolute;
            background: rgba(141, 110, 99, 0.08);
            border: 1.5px solid rgba(215, 204, 200, 0.25);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            overflow: hidden;
        }
        .panel-zone:hover {
            background: rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
        }
        .panel-zone .zone-label {
            color: rgba(255,255,255,0.9);
            font-size: 0.55em;
            font-weight: 600;
            line-height: 1.2;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            letter-spacing: 0.02em;
        }
        .panel-zone .zone-fin {
            color: #f59e0b;
            font-size: 0.5em;
            font-family: monospace;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            margin-top: 2px;
        }

        /* --- Top Half: Circuit Breakers --- */
        #zone-cb-left        { top: 15.5%; left: 4.5%; width: 40%; height: 32.5%; }
        #zone-cb-right       { top: 15.5%; left: 54.5%; width: 40%; height: 32.5%; }

        /* --- Bottom Half Columns (Aligned perfectly with image panels) --- */
        /* Column 1 (Leftmost) */
        #zone-adiru          { top: 50.5%; left: 4%; width: 22.5%; height: 16.5%; }
        #zone-electrical     { top: 67.5%; left: 4%; width: 22.5%; height: 16.5%; }
        #zone-wipers-lights  { top: 84.5%; left: 4%; width: 22.5%; height: 4.5%; }

        /* Column 2 */
        #zone-emer-lights    { top: 50.5%; left: 27.5%; width: 22.5%; height: 16.5%; }
        #zone-hyd-ram-air    { top: 67.5%; left: 27.5%; width: 22.5%; height: 16.5%; }
        #zone-pass-signs     { top: 84.5%; left: 27.5%; width: 22.5%; height: 13.5%; }

        /* Column 3 */
        #zone-engine-mcp     { top: 50.5%; left: 51%; width: 22.5%; height: 16.5%; }
        #zone-fuel-jettison  { top: 67.5%; left: 51%; width: 22.5%; height: 16.5%; }
        #zone-anti-ice       { top: 84.5%; left: 51%; width: 22.5%; height: 13.5%; }

        /* Column 4 (Rightmost) */
        #zone-air-cond       { top: 50.5%; left: 74.5%; width: 22.5%; height: 16.5%; }
        #zone-bleed-press    { top: 67.5%; left: 74.5%; width: 22.5%; height: 16.5%; }
        #zone-lighting-r     { top: 84.5%; left: 74.5%; width: 22.5%; height: 4.5%; }

        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99;
        }
        .popup-box {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #2b1f1c;
            border: 2px solid #f59e0b;
            padding: 22px 25px;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9);
            z-index: 100;
            width: 92%; max-width: 440px;
        }
        .popup-box h3 { margin: 0 0 12px 0; color: #ffffff; font-size: 1.1em; padding-right: 30px; }
        .popup-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.85em; }
        .popup-row .label { color: #bcaaa4; min-width: 40px; }
        .popup-row .value { font-family: monospace; color: #f59e0b; }
        .popup-row .value.sn { color: #a3e635; }
        .popup-divider { border: none; border-top: 1px solid #4e342e; margin: 12px 0; }
        .popup-contents { font-size: 0.85em; color: #d7ccc8; line-height: 1.6; }
        .popup-contents strong { color: #ffffff; }
        
        .close-btn {
            position: absolute; top: 12px; right: 12px;
            background: #4e342e; color: white; border: none;
            padding: 4px 9px; cursor: pointer; border-radius: 4px; font-size: 0.85em;
        }
        .close-btn:hover { background: #d97706; color: #1a1412; }

        .parts-section { width: 100%; max-width: 900px; margin-top: 20px; }
        .parts-section h2 { color: #ffffff; border-bottom: 2px solid #4e342e; padding-bottom: 10px; }
        .search-box {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: #2b1f1c; border: 1px solid #4e342e;
            border-radius: 6px; color: #f3f4f6; font-size: 0.9em;
        }
        .search-box:focus { outline: none; border-color: #f59e0b; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        thead tr { background: #1a1412; color: #f59e0b; text-align: left; }
        th { padding: 12px 15px; border-bottom: 2px solid #f59e0b; }
        td { padding: 10px 15px; border-bottom: 1px solid #4e342e; }
        tbody tr:nth-child(even) { background: #221816; }
        tbody tr:hover { background: #3e2723; }
        .pn { font-family: monospace; color: #f59e0b; }
        .sn { font-family: monospace; color: #a3e635; }
    </style>
</head>
<body>

            <div class="zone-label">RIGHT OVERHEAD CIRCUIT BREAKER PANEL (P11)</div>
            <div class="zone-fin">P/N</div>
        </div>
